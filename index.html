<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botswana Hospital Queue Booking</title>
  <style>
    :root{ --primary:#2a5c82; --primary-dark:#1f4561; --bg:#f2f2f2; }
    *{box-sizing:border-box}
    body{font-family:Arial, sans-serif;background:var(--bg);margin:0}

    /* Header with flex so the language button is always visible on the right */
    .site-header{background:var(--primary);color:#fff;position:sticky;top:0;z-index:1000}
    .header-inner{
      max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:16px 20px;
    }
    .site-subtitle{max-width:1100px;margin:0 auto;padding:0 20px 16px 20px;color:#e7eef5}

    .lang-btn{
      background:#fff;color:var(--primary);border:none;padding:10px 16px;border-radius:24px;
      cursor:pointer;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.15)
    }

    .container{
      width:90%;max-width:900px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px #ccc
    }
    h2{color:var(--primary);margin-top:0}
    label{font-weight:bold;display:block}
    input,select,textarea,button{
      width:100%;padding:12px;margin-top:8px;margin-bottom:18px;border-radius:6px;border:1px solid #aaa
    }
    button.primary{background:var(--primary);color:#fff;font-size:16px;cursor:pointer;border:none}
    button.primary:hover{background:var(--primary-dark)}
    .info{padding:15px;background:#e8ffe8;border-left:5px solid #28a745}
    .warn{padding:12px;background:#fff6e5;border-left:5px solid #f0ad4e;margin-top:10px}
    #recommendationBox{background:#e8f4ff;padding:15px;border-left:5px solid var(--primary);display:none;margin-top:10px}
    small.muted{color:#666}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .row>div{flex:1 1 220px}
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <h1 id="title" style="margin:0">Botswana Public Hospital Queue Booking</h1>
    <!-- Language toggle—always visible -->
    <button class="lang-btn" id="langBtn" type="button" onclick="toggleLanguage()">Setswana</button>
  </div>
  <p class="site-subtitle" id="subtitle">Book your queue, submit your symptoms, and get basic health recommendations.</p>
</header>

<!-- Booking -->
<div class="container">
  <h2 id="formTitle">Queue Booking Form</h2>

  <div class="row">
    <div>
      <label id="nameLabel" for="name">Full Name</label>
      <input id="name" placeholder="Enter your full name"/>
    </div>
    <div>
      <label id="omangLabel" for="omang">National ID (Omang)</label>
      <input id="omang" placeholder="Enter your Omang"/>
    </div>
  </div>

  <div class="row">
    <div>
      <label id="hospitalLabel" for="hospital">Select Hospital</label>
      <select id="hospital">
        <option value="">-- choose hospital --</option>
        <option>Princess Marina Hospital</option>
        <option>Nyangabgwe Referral Hospital</option>
        <option>Molepolole DHMT</option>
        <option>Mochudi Hospital</option>
        <option>Ghanzi Primary Hospital</option>
      </select>
    </div>
    <div>
      <label id="reasonLabel" for="reason">Reason for Visit</label>
      <input id="reason" placeholder="E.g. check-up, pain, fever"/>
    </div>
  </div>

  <!-- Live preview of next slot/time -->
  <div id="previewSlot" class="warn" style="display:none"></div>

  <button class="primary" onclick="submitBooking()" id="bookBtn">Book Queue</button>

  <div id="bookingMessage"></div>

<!-- Symptoms -->
<div class="container">
  <h2 id="symptomTitle">Submit Your Symptoms</h2>
  <textarea id="symptoms" rows="5" placeholder="Describe your symptoms..."></textarea>
  <button class="primary" onclick="giveRecommendation()" id="recommendBtn">Get Recommendation</button>
  <div id="recommendationBox"></div>
</div>

<script>
/* =========================
   LANGUAGE TOGGLE
========================= */
let language = "EN"; // EN or TS
function t(en, ts){ return language === "TS" ? ts : en; }

function toggleLanguage(){
  language = (language === "EN") ? "TS" : "EN";
  document.getElementById("langBtn").innerText = (language === "EN") ? "Setswana" : "English";
  updateLanguage();
  updatePreview(); // keep preview text in sync
}

function updateLanguage(){
  document.getElementById("title").innerText      = t("Botswana Public Hospital Queue Booking", "Bokopano Jwa Dipetlele tsa Botswana");
  document.getElementById("subtitle").innerText   = t("Book your queue, submit your symptoms, and get basic health recommendations.", "Kwadisa queue, tsenya matshwao, mme o bone kgakololo ya motheo.");
  document.getElementById("formTitle").innerText  = t("Queue Booking Form", "Foromo ya go Kwadisa Queue");
  document.getElementById("nameLabel").innerText  = t("Full Name", "Leina le le tletseng");
  document.getElementById("name").placeholder     = t("Enter your full name", "Tsenya leina la gago");
  document.getElementById("omangLabel").innerText = t("National ID (Omang)", "Nomoro ya Omang");
  document.getElementById("omang").placeholder    = t("Enter your Omang", "Tsenya Omang ya gago");
  document.getElementById("hospitalLabel").innerText = t("Select Hospital", "Kgetha Sepatela");
  document.getElementById("reasonLabel").innerText   = t("Reason for Visit", "Lebaka la Ketelo");
  document.getElementById("reason").placeholder      = t("E.g. check-up, pain, fever", "Sekao: tlhahlobo, botlhoko, mogote");
  document.getElementById("bookBtn").innerText    = t("Book Queue", "Kwadisa Queue");
  document.getElementById("symptomTitle").innerText = t("Submit Your Symptoms", "Tsenya Matshwao a Bolwetse");
  document.getElementById("symptoms").placeholder = t("Describe your symptoms...", "Tlhalosa matshwao a gago...");
  document.getElementById("recommendBtn").innerText = t("Get Recommendation", "Bona Kgakololo");
  document.getElementById("demoTitle").innerText  = t("Demo notice:", "Tlhokomeliso ya teko:");
}

/* =========================
   SLOT SCHEDULER (Front-end demo)
========================= */
// You can change these:
const SLOT_MINUTES = 10;      // each slot is 10 minutes
const CLINIC_START = "08:00"; // clinic opens
const CLINIC_END   = "16:00"; // clinic closes

function todayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function hospitalQueueKey(h){ return `queueIndex|${todayKey()}|${h}`; }

function parseTimeToday(hhmm){
  const [h,m] = hhmm.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}
function addMinutes(date, mins){ return new Date(date.getTime() + mins*60000); }
function fmtTime(date){
  const h = String(date.getHours()).padStart(2,"0");
  const m = String(date.getMinutes()).padStart(2,"0");
  return `${h}:${m}`;
}

/** Compute next available slot for a hospital for today. */
function getNextSlot(hospital){
  const start = parseTimeToday(CLINIC_START);
  const end   = parseTimeToday(CLINIC_END);
  const totalSlots = Math.max(0, Math.floor((end - start) / (SLOT_MINUTES*60000)));

  const key = hospitalQueueKey(hospital);
  let index = parseInt(localStorage.getItem(key) || "0", 10);

  // Don’t assign a past slot
  const now = new Date();
  const minsSinceStart = Math.floor((now - start)/60000);
  const currentSlotIndex = Math.max(0, Math.floor(minsSinceStart / SLOT_MINUTES));
  const minutesIntoCurrentSlot = Math.max(0, minsSinceStart % SLOT_MINUTES);
  const snapForward = minutesIntoCurrentSlot > 0 ? 1 : 0;
  index = Math.max(index, currentSlotIndex + snapForward);

  if(index >= totalSlots){
    return {
      available:false,
      messageEN:"No more slots today. Please choose another day.",
      messageTS:"Ga go na dislot tse dingwe gompieno. Tsweetswee tlhopha letsatsi le lengwe."
    };
  }

  const slotStart = addMinutes(start, index * SLOT_MINUTES);
  const queueNumber = index + 1;
  return { available:true, slotStart, queueNumber, key, nextIndex:index+1, totalSlots };
}

// Show preview when hospital changes
document.getElementById("hospital").addEventListener("change", updatePreview);
function updatePreview(){
  const hospital = document.getElementById("hospital").value;
  const preview = document.getElementById("previewSlot");
  if(!hospital){ preview.style.display="none"; return; }

  const res = getNextSlot(hospital);
  preview.style.display = "block";
  if(!res.available){
    preview.textContent = t(res.messageEN, res.messageTS);
  }else{
    const msgEN = `Next available slot: ${fmtTime(res.slotStart)} (Queue #${res.queueNumber}).`;
    const msgTS = `Slot e e latelang: ${fmtTime(res.slotStart)} (Paloganyo #${res.queueNumber}).`;
    preview.textContent = t(msgEN, msgTS);
  }
}

/* =========================
   BOOKING FUNCTION
========================= */
function submitBooking(){
  const name = document.getElementById('name').value.trim();
  const omang = document.getElementById('omang').value.trim();
  const hospital = document.getElementById('hospital').value;
  const reason = document.getElementById('reason').value.trim();
  const msgDiv = document.getElementById('bookingMessage');

  if(!name || !omang || !hospital || !reason){
    alert(t("Please fill all fields.", "Tsweetswee tsenya dintlha tsotlhe."));
    return;
  }

  const res = getNextSlot(hospital);
  if(!res.available){
    msgDiv.innerHTML = `<p class="warn">${t(res.messageEN, res.messageTS)}</p>`;
    return;
  }

  // Reserve: increment index for that hospital for today
  localStorage.setItem(res.key, String(res.nextIndex));

  const slotTime = fmtTime(res.slotStart);
  const queueNo  = res.queueNumber;

  const confirmEN = `
    <div class="info">
      <strong>Thank you, ${name}.</strong><br>
      Your queue at <strong>${hospital}</strong> is booked for <strong>${todayKey()}</strong>.<br>
      Queue Number: <strong>#${queueNo}</strong><br>
      <u>Time Slot:</u> <strong>${slotTime}</strong> (slot length ${SLOT_MINUTES} mins)<br>
      Omang: ${omang}<br>
      Reason: ${reason}<br>
      <small class="muted">Please arrive 10 minutes early with your Omang and any medical records.</small>
    </div>`;

  const confirmTS = `
    <div class="info">
      <strong>Re a leboga, ${name}.</strong><br>
      Queue ya gago kwa <strong>${hospital}</strong> e kwadisitswe <strong>${todayKey()}</strong>.<br>
      Paloganyo: <strong>#${queueNo}</strong><br>
      <u>Nako ya Slot:</u> <strong>${slotTime}</strong> (boleele jwa slot metsotso e ${SLOT_MINUTES})<br>
      Omang: ${omang}<br>
      Lebaka: ${reason}<br>
      <small class="muted">Tsweetswee fitlha metsotso e 10 pele, o tletse Omang le dikwalo tsotlhe.</small>
    </div>`;

  msgDiv.innerHTML = (language === "TS") ? confirmTS : confirmEN;

  // Update the preview for the next patient
  updatePreview();
}

/* =========================
   SYMPTOM CHECKER (EN + TS)
========================= */
function giveRecommendation(){
  const symptoms = document.getElementById("symptoms").value.toLowerCase();
  const box = document.getElementById("recommendationBox");

  if(!symptoms){
    alert(t("Please enter your symptoms.", "Tsweetswee tsenya matshwao a gago."));
    return;
  }

  let advice = t(
    "Please visit a hospital for a full check-up.",
    "Etela sepatela gore o tlholelwe sentle."
  );

  if(symptoms.includes("mogote") || symptoms.includes("fever")){
    advice = t(
      "You may have a fever. Drink plenty of water and rest.",
      "O ka tswa o na le mogote. Nwa metsi a mantsi mme o ikhutse."
    );
  }
  if(symptoms.includes("kgwa") || symptoms.includes("cough") || symptoms.includes("sore throat") || symptoms.includes("bolwetse jwa phatlho")){
    advice = t(
      "These may be flu-like symptoms. Wear a mask, rest; seek care if it worsens.",
      "Matshwao a ka supa phatlho. Apara maseke, ikhutse; etela sepatela fa go gola."
    );
  }
  if(symptoms.includes("botlhoko mo sefubeng") || symptoms.includes("chest pain")){
    advice = t(
      "Chest pain can be serious. Seek medical attention immediately.",
      "Botlhoko mo sefubeng bo ka nna kotsi. Etela sepatela ka ponyo ya leitlho."
    );
  }
  if(symptoms.includes("botlhoko jwa tlhogo") || symptoms.includes("headache")){
    advice = t(
      "Headaches may be due to dehydration or stress. Drink water and rest.",
      "Botlhoko jwa tlhogo bo ka bisiwa ke go se nwe metsi kgotsa kgatelelo. Nwa metsi, ikhutse."
    );
  }

  box.style.display = "block";
  box.innerHTML = `<strong>${t("Recommendation", "Kgakololo")}:</strong><br>${advice}`;
}

// Initialize default language content
updateLanguage();
</script>

</body>
</html>
