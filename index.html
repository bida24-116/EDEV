<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botswana Hospital Queue Booking</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2a5c82;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .lang-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            color: #2a5c82;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #aaa;
        }

        button {
            background: #2a5c82;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #1f4561;
        }

        #recommendationBox {
            background: #e8f4ff;
            padding: 15px;
            border-left: 5px solid #2a5c82;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<button class="lang-btn" onclick="toggleLanguage()">Setswana</button>

<header>
    <h1 id="title">Botswana Public Hospital Queue Booking</h1>
    <p id="subtitle">Book your queue, submit your symptoms, and get basic health recommendations.</p>
</header>

<div class="container">
    <h2 id="formTitle">Queue Booking Form</h2>

    <label id="nameLabel">Full Name</label>
    <input id="name" placeholder="Enter your full name">

    <label id="omangLabel">National ID (Omang)</label>
    <input id="omang" placeholder="Enter your Omang">

    <label id="hospitalLabel">Select Hospital</label>
    <select id="hospital">
        <option value="">-- choose hospital --</option>
        <option>Princess Marina Hospital</option>
        <option>Nyangabgwe Referral Hospital</option>
        <option>Molepolole DHMT</option>
        <option>Mochudi Hospital</option>
        <option>Ghanzi Primary Hospital</option>
    </select>

    <label id="reasonLabel">Reason for Visit</label>
    <input id="reason" placeholder="E.g. check-up, pain, fever">

    <button onclick="submitBooking()" id="bookBtn">Book Queue</button>

    <div id="bookingMessage"></div>
</div>

<div class="container">
    <h2 id="symptomTitle">Submit Your Symptoms</h2>

    <textarea id="symptoms" rows="5" placeholder="Describe your symptoms..."></textarea>
    <button onclick="giveRecommendation()" id="recommendBtn">Get Recommendation</button>

    <div id="recommendationBox"></div>
</div>

<script>
let language = "EN"; // Default language

function toggleLanguage() {
    language = (language === "EN") ? "TS" : "EN";
    document.querySelector(".lang-btn").innerText = (language === "EN") ? "Setswana" : "English";
    updateLanguage();
}

function updateLanguage() {
    if (language === "TS") {
        document.getElementById("title").innerText = "Bokopano Jwa Dipetlele tsa Botswana";
        document.getElementById("subtitle").innerText = "Kwadisa leina, tsenya matshwao, mme o bone kgakololo.";
        document.getElementById("formTitle").innerText = "Foromo ya go Kwadisa Queue";
        document.getElementById("nameLabel").innerText = "Leina le le tletseng";
        document.getElementById("name").placeholder = "Tsenya leina la gago";
        document.getElementById("omangLabel").innerText = "Nomoro ya Omang";
        document.getElementById("omang").placeholder = "Tsenya Omang ya gago";
        document.getElementById("hospitalLabel").innerText = "Kgetha Sepatela";
        document.getElementById("reasonLabel").innerText = "Lebaka la Ketelo";
        document.getElementById("reason").placeholder = "Sekao: tlhahlobo, botlhoko, mogote";
        document.getElementById("bookBtn").innerText = "Kwadisa Queue";
        document.getElementById("symptomTitle").innerText = "Tsenya Matshwao a Bolwetse";
        document.getElementById("symptoms").placeholder = "Tlhalosa matshwao a gago...";
        document.getElementById("recommendBtn").innerText = "Bona Kgakololo";
    } else {
        document.getElementById("title").innerText = "Botswana Public Hospital Queue Booking";
        document.getElementById("subtitle").innerText = "Book your queue, submit your symptoms, and get basic health recommendations.";
        document.getElementById("formTitle").innerText = "Queue Booking Form";
        document.getElementById("nameLabel").innerText = "Full Name";
        document.getElementById("name").placeholder = "Enter your full name";
        document.getElementById("omangLabel").innerText = "National ID (Omang)";
        document.getElementById("omang").placeholder = "Enter your Omang";
        document.getElementById("hospitalLabel").innerText = "Select Hospital";
        document.getElementById("reasonLabel").innerText = "Reason for Visit";
        document.getElementById("reason").placeholder = "E.g. check-up, pain, fever";
        document.getElementById("bookBtn").innerText = "Book Queue";
        document.getElementById("symptomTitle").innerText = "Submit Your Symptoms";
        document.getElementById("symptoms").placeholder = "Describe your symptoms...";
        document.getElementById("recommendBtn").innerText = "Get Recommendation";
    }
}


// =========================
// BOOKING FUNCTION
// =========================

function submitBooking() {
    const name = document.getElementById('name').value;
    const omang = document.getElementById('omang').value;
    const hospital = document.getElementById('hospital').value;
    const reason = document.getElementById('reason').value;

    if (!name || !omang || !hospital || !reason) {
        alert(language === "TS" ? "Tsweetswee tsenya dintlha tsotlhe." : "Please fill all fields.");
        return;
    }

    document.getElementById('bookingMessage').innerHTML =
        `<p style="padding:15px;background:#e8ffe8;border-left:5px solid #28a745;">
            ${language === "TS" ? "Re a leboga" : "Thank you"} <strong>${name}</strong>.
            ${language === "TS" ? "Queue ya gago e kwadisitswe mo" : "Your queue has been booked at"} 
            <strong>${hospital}</strong>.
        </p>`;
}


// =========================
// SETSWANA + ENGLISH SYMPTOM CHECKER
// =========================

function giveRecommendation() {
    const symptoms = document.getElementById("symptoms").value.toLowerCase();
    const box = document.getElementById("recommendationBox");

    if (!symptoms) {
        alert(language === "TS" ?
              "Tsweetswee tsenya matshwao a gago." :
              "Please enter your symptoms.");
        return;
    }

    let advice = language === "TS" ?
        "Etela sepatela gore o tlholelwe sentle." :
        "Please visit a hospital for a full check-up.";

    if (symptoms.includes("mogote") || symptoms.includes("fever")) {
        advice = language === "TS" ?
            "O ka tswa o na le mogote. Nwa metsi a mantsi." :
            "You may have a fever. Drink plenty of water.";
    }

    if (symptoms.includes("kgwa") || symptoms.includes("cough")) {
        advice = language === "TS" ?
            "O ka nna le phatlho. Apara maseke." :
            "You may have flu-like symptoms. Wear a mask.";
    }

    if (symptoms.includes("botlhoko mo sefubeng") || symptoms.includes("chest pain")) {
        advice = language === "TS" ?
            "Botlhoko mo sefubeng bo kotsi. Etela sepatela ka ponyo ya leitlho." :
            "Chest pain can be serious. Seek care immediately.";
    }

    box.style.display = "block";
    box.innerHTML = `<strong>${language === "TS" ? "Kgakololo" : "Recommendation"}:</strong><br>${advice}`;
}
</script>

</body>
</html>
